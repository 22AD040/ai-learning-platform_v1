services:
  # FastAPI Backend Service
  - type: web
    name: smart-academic-fastapi
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn fastapi_server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
        value: 3.10.13
      - key: SECRET_KEY
        generateValue: true

  # Streamlit Frontend Service  
  - type: web
    name: smart-academic-streamlit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
        value: 3.10.13
      - key: FASTAPI_URL
        value: https://smart-academic-fastapi.onrender.com